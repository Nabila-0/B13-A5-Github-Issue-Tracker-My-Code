<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">


    <!-- linking Tailwind CSS play CDN  -->

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>


    <!-- linking DaisyUI play CDN  -->

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />


    <!-- linking Font Awesome CDN  -->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />


    <!-- adding Google Font  -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>


    <title>GitHub Issues Tracker | Sign In</title>
</head>

<body>
    <section class="sign_in_section bg-[#F8FAFC] 
    max-w-[1600px] min-h-screen py-[78px]">

        <div class="bg-white max-w-[520px] mx-auto p-8 rounded-lg 
        shadow-xl">

            <div class="upper_part text-center">

                <div class="image_div w-[100px] mx-auto">
                    <img src="./assets/github-logo.png" alt="">

                </div>
                <h1 class="font-semibold text-2xl text-[#1F2937] 
                mt-6 mb-1">GitHub Issues Tracker</h1>

                <p class="text-[#64748B] text-base font-normal mb-6">Sign in to manage your issues</p>
            </div>

            <div class="middle_part max-w-[456px]">

                <div class="card bg-base-100 ">
                    <div class="card-body p-0">
                        <fieldset class="fieldset">

                            <label class="label text-[#1F2937] font-medium text-base">Username</label>

                            <input type="text" 
                            id="input_username"
                            class="input w-full 
                            mt-2 mb-1.5 text-[#64748B] text-base font-normal p-4 py-6 rounded-lg border 
                            border-[#E4E4E7]" placeholder="Enter Username"/>

                            <p class="text-[#4A00FF] text-[14px] font-normal mb-4">Default: admin</p>


                            <label class="label text-[#1F2937] font-medium text-base">Password</label>

                            <input type="password" 
                            id="input_password"
                            class="input w-full mt-2 mb-1.5 text-[#64748B] text-base font-normal p-4 py-6 rounded-lg border border-[#E4E4E7]" placeholder="Password" />

                            <p class="text-[#4A00FF] text-[14px] font-normal mb-6">Default: admin123</p>

                            <button id="signin_btn"
                            class="bg-[#4A00FF] text-white text-base font-semibold p-4 rounded-lg mb-6 cursor-pointer hover:bg-blue-600">Sign In</button>
                        </fieldset>
                    </div>
                </div>

            </div>

            <div class="lower_part">

                <div class="flex items-center gap-2 mb-6">

                    <hr class="flex-1 border border-[#E4E4E7]">
                    <p class="text-[#1F2937] text-base font-normal">OR</p>
                    <hr class="flex-1 border border-[#E4E4E7]">
                </div>


                <div class="text-center">
                    <p class="text-[14px] font-normal text-[#64748B]">Demo Credentials:</p>

                    <div class="bg-[#F8FAFC] p-6 rounded-lg mt-2">
                        <p>
                            <span class="text-[#1F2937] text-base font-semibold">Username:</span>
                            <span class="text-[#1F2937] text-base font-normal">admin</span>
                        </p>
                        <p>
                            <span class="text-[#1F2937] text-base font-semibold">Password:</span>
                            <span class="text-[#1F2937] text-base font-normal">admin123</span>
                        </p>
                    </div>
                </div>
            </div>

        </div>
    </section>



    <!-- linking signin.js file  -->

    <script src="./script/signin.js"></script>
</body>

</html>
